<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bosh Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --card: #16161a;
      --accent: #e8c86e;
      --accent2: #5b8dee;
      --text: #f0ede8;
      --muted: #888;
      --border: rgba(255,255,255,0.07);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      opacity: 0.15;
    }
    .glow-1 { background: var(--accent); top: -150px; left: -150px; }
    .glow-2 { background: var(--accent2); bottom: -150px; right: -150px; }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), #fff 60%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 3.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 240px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.8s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.25s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
      border-radius: 20px;
    }
    .card-register::before { background: radial-gradient(circle at top left, rgba(232,200,110,0.12), transparent 70%); }
    .card-login::before   { background: radial-gradient(circle at top left, rgba(91,141,238,0.12), transparent 70%); }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .card-register:hover { border-color: var(--accent); }
    .card-login:hover    { border-color: var(--accent2); }
    .card:hover::before  { opacity: 1; }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-arrow {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      transition: transform 0.3s;
      display: inline-block;
    }
    .card:hover .card-arrow { transform: translateX(6px); }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <div class="logo">MyApp</div>
    <p class="subtitle">Xush kelibsiz — davom etish uchun tanlang</p>

    <div class="cards">
      <a href="register.html" class="card card-register">
        <div class="card-icon">✦</div>
        <div class="card-title">Ro'yxatdan o'tish</div>
        <div class="card-desc">Yangi hisob yarating va imkoniyatlardan foydalaning.</div>
        <div class="card-arrow">→</div>
      </a>

      <a href="#" class="card card-login">
        <div class="card-icon">◈</div>
        <div class="card-title">Kirish</div>
        <div class="card-desc">Mavjud hisobingiz bilan tizimga kiring.</div>
        <div class="card-arrow">→</div>
      </a>
    </div>
  </div>
</body>
</html>
